name: Commit Message Check

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          # Get the base ref for comparison
          BASE_REF="${{ github.base_ref }}"
          HEAD_REF="${{ github.head_ref }}"
          
          # Fetch the base branch
          git fetch origin "$BASE_REF"
          
          # Get all commits between base and head
          COMMITS=$(git log origin/$BASE_REF..HEAD --pretty=format:"%s")
          
          # Regex pattern for conventional commits
          PATTERN='^(feat|fix|docs|style|refactor|test|chore|perf|build|ci|revert)(\(.+\))?!?:\s.+'
          
          ERROR=0
          
          echo "Checking commit messages..."
          echo ""
          
          while IFS= read -r commit; do
            if [[ ! "$commit" =~ $PATTERN ]]; then
              echo "::error::Invalid commit message: '$commit'"
              ERROR=1
            else
              echo "✓ Valid: $commit"
            fi
          done <<< "$COMMITS"
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "::error::One or more commit messages do not follow the Conventional Commits format."
            echo ""
            echo "Expected format:"
            echo "  <type>(<optional scope>): <description>"
            echo ""
            echo "Types: feat, fix, docs, style, refactor, test, chore, perf, build, ci, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add user authentication"
            echo "  fix: resolve login bug"
            echo "  docs(api): update API documentation"
            echo "  refactor(core)!: breaking change in core module"
            exit 1
          fi
          
          echo ""
          echo "All commit messages follow the Conventional Commits format!"