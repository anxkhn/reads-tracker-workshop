name: PR Description Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        env:
          PR_BODY: "${{ github.event.pull_request.body }}"
          PR_NUMBER: "${{ github.event.pull_request.number }}"
        run: |
          # Check if PR body exists
          if [ -z "$PR_BODY" ] || [ "$PR_BODY" = "null" ]; then
            echo "::error::PR #$PR_NUMBER is missing a description."
            echo ""
            echo "Please add a description to your pull request."
            echo "A good PR description should explain:"
            echo "  - What changes you made"
            echo "  - Why you made these changes"
            echo "  - How to test the changes"
            exit 1
          fi
          
          # Calculate description length (excluding whitespace)
          DESC_LENGTH=$(echo "$PR_BODY" | tr -d '[:space:]' | wc -c)
          MIN_LENGTH=50
          
          if [ "$DESC_LENGTH" -lt "$MIN_LENGTH" ]; then
            echo "::error::PR description is too short ($DESC_LENGTH characters). Minimum required: $MIN_LENGTH characters."
            echo ""
            echo "Current description length: $DESC_LENGTH characters (excluding whitespace)"
            echo "Minimum required: $MIN_LENGTH characters"
            echo ""
            echo "Please expand your PR description to include more details about:"
            echo "  - What changes you made"
            echo "  - Why you made these changes"
            echo "  - Any relevant context or testing instructions"
            exit 1
          fi
          
          echo "✓ PR description is valid ($DESC_LENGTH characters)"